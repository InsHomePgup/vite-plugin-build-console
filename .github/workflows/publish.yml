name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 2.0.2)
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Publish to npm via Trusted Publishing
        run: |
          # Step 1: Get OIDC token from GitHub
          oidc_token=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            | jq -r '.value')

          # Step 2: Exchange OIDC token for temporary npm publish token
          echo "=== Exchanging OIDC token ==="
          exchange_response=$(curl -sS \
            -X POST "https://registry.npmjs.org/-/v1/user/token" \
            -H "Authorization: Bearer ${oidc_token}" \
            -H "Content-Type: application/json" \
            -d '{"type":"oidc"}')
          echo "Exchange response: ${exchange_response}"

          npm_token=$(echo "${exchange_response}" | jq -r '.token // empty')

          if [ -z "${npm_token}" ]; then
            echo "Exchange failed, response: ${exchange_response}"
            exit 1
          fi

          # Step 3: Publish with the temporary token
          npm config set //registry.npmjs.org/:_authToken "${npm_token}"
          npm publish --provenance --no-git-checks
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
