name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Debug
        run: |
          echo "npm: $(npm --version)"
          echo "GITHUB_ACTIONS: $GITHUB_ACTIONS"
          echo "OIDC URL present: $([[ -n \"$ACTIONS_ID_TOKEN_REQUEST_URL\" ]] && echo yes || echo no)"
          cat ~/.npmrc 2>/dev/null || echo "no ~/.npmrc"
          cat .npmrc 2>/dev/null || echo "no .npmrc"

      - run: npm publish --provenance --no-git-checks --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ''
