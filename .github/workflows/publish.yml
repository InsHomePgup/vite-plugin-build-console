name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 2.0.2)
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Debug OIDC token claims
        run: |
          oidc_token=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            | jq -r '.value')
          echo "=== OIDC token payload claims ==="
          echo "${oidc_token}" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: Publish to npm via Trusted Publishing
        run: |
          oidc_token=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            | jq -r '.value')
          npm config set //registry.npmjs.org/:_authToken "${oidc_token}"
          npm publish --provenance --no-git-checks
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
