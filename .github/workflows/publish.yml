name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Inspect npm Trusted Publishing code
        run: |
          NPM_LIB=$(npm root -g)/npm
          echo "=== npm version ==="
          npm --version
          echo "=== libnpmpublish publish.js auth section ==="
          grep -n -A5 -B2 "ENEEDAUTH\|provenance\|oidc\|OIDC\|trusted" \
            ${NPM_LIB}/node_modules/libnpmpublish/lib/publish.js 2>/dev/null | head -80 || \
          grep -n -A5 -B2 "ENEEDAUTH\|provenance\|oidc\|OIDC\|trusted" \
            ${NPM_LIB}/node_modules/libnpmpublish/lib/*.js 2>/dev/null | head -80 || \
          echo "libnpmpublish not found at expected path"
          echo "=== npm publish.js auth section ==="
          grep -rn -A3 "ENEEDAUTH\|getPublishConfig\|provenance" \
            ${NPM_LIB}/lib/commands/publish.js 2>/dev/null | head -60 || echo "not found"

      - run: npm publish --provenance --no-git-checks --ignore-scripts
