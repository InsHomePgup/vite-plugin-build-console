catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*
  - examples/*

allowBuilds:
  esbuild: true
  simple-git-hooks: true
overrides:
  ajv@6: 6.14.0
  brace-expansion@1: 1.1.13
  defu: 6.1.7
  fast-uri: 3.1.1
  flatted: 3.4.2
  handlebars: 4.7.9
  picomatch@2: 2.3.2
  picomatch@4: 4.0.4
  postcss: 8.5.10
  rollup: 4.59.0
  svgo: 4.0.1
  vite: 7.3.3
  yaml: 2.9.0
